<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Status Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Status Dashboard</h1>
    <a href="/permits" class="btn btn-primary mb-3">Back to Permits</a>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Permit Type</th>
            <th th:each="status : ${statuses}" th:text="${status}"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="permitType : ${permitTypes}">
            <td th:text="${permitType}"></td>
            <td th:each="status : ${statuses}">
                <a th:if="${dashboardData[permitType] != null and dashboardData[permitType][status] != null and dashboardData[permitType][status] > 0}"
                   th:href="@{/permits?permitType={type}&status={stat}(type=${permitType}, stat=${status})}"
                   th:text="${dashboardData[permitType][status]}">
                </a>
                <span th:if="${dashboardData[permitType] == null or dashboardData[permitType][status] == null or dashboardData[permitType][status] == 0}" th:text="0"></span>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
