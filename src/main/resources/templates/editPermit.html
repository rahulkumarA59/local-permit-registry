<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Permit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Edit Permit</h1>
    <form th:action="@{/permits/edit/{id}(id=${permit.id})}" method="post" th:object="${permit}">
        <div class="mb-3">
            <label for="applicantName" class="form-label">Applicant Name</label>
            <input type="text" class="form-control" id="applicantName" th:field="*{applicantName}" required>
        </div>
        <div class="mb-3">
            <label for="applicantContact" class="form-label">Applicant Contact</label>
            <input type="text" class="form-control" id="applicantContact" th:field="*{applicantContact}" required>
        </div>
        <div class="mb-3">
            <label for="permitType" class="form-label">Permit Type</label>
            <select class="form-control" id="permitType" th:field="*{permitType}" required>
                <option th:each="type : ${permitTypes}" th:value="${type}" th:text="${type}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="wardOrArea" class="form-label">Ward or Area</label>
            <input type="text" class="form-control" id="wardOrArea" th:field="*{wardOrArea}" required>
        </div>
        <div class="mb-3">
            <label for="applicationDate" class="form-label">Application Date</label>
            <input type="date" class="form-control" id="applicationDate" th:field="*{applicationDate}" required>
        </div>
        <div class="mb-3">
            <label for="intendedStartDate" class="form-label">Intended Start Date</label>
            <input type="date" class="form-control" id="intendedStartDate" th:field="*{intendedStartDate}" required>
        </div>
        <div class="mb-3">
            <label for="intendedEndDate" class="form-label">Intended End Date</label>
            <input type="date" class="form-control" id="intendedEndDate" th:field="*{intendedEndDate}" required>
        </div>
        <div class="mb-3">
            <label for="remarks" class="form-label">Remarks</label>
            <textarea class="form-control" id="remarks" th:field="*{remarks}"></textarea>
        </div>
        <div class="mb-3">
            <label for="status" class="form-label">Status</label>
            <select class="form-control" id="status" th:field="*{status}" required>
                <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="/permits" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
